<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://formsubmit.co; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="color-scheme" content="dark light">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CyJimm — אבטחה • תשתיות • חדשנות</title>
  <meta name="description" content="CyJimm — פתרונות אבטחת מידע ותשתיות. שירותים מנוהלים, פרויקטים, וייעוץ קצה-לקצה."/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@300;400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./assets/site.css">

  <style>
    .nav { flex-direction: row; gap: 28px; }
    .nav .links { margin-left: auto; display: flex; gap: 12px; }
    .nav .links a { padding: 8px 14px; background: rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.16); border-radius:14px; }
    .nav .links a:hover { background: rgba(255,255,255,.15); }
    .form-status { margin-top:12px; padding:10px 12px; border-radius:12px; border:1px solid rgba(255,255,255,.14); display:none; }
    .form-status.ok { display:block; border-color:#48d38a; }
    .form-status.err { display:block; border-color:#ff5f5f; }
    .hp-field { position:absolute; left:-9999px; }
  </style>
</head>
<body>

<section id="contact" class="contact">
  <div class="wrap">
    <h2>יצירת קשר</h2>
    <form data-contact-form action="https://formsubmit.co/ajax/madara@cyjimm.com" method="POST">
      <input name="name" placeholder="שם מלא" required>
      <input type="email" name="email" placeholder="אימייל" required>
      <input name="company" placeholder="חברה">
      <textarea name="message" placeholder="הודעה" required></textarea>

      <input type="hidden" name="_subject" value="New Lead from CyJimm">
      <input type="hidden" name="_captcha" value="false">

      <input class="hp-field" type="text" name="website">

      <button type="submit">שליחה</button>
      <div id="contactStatus" class="form-status"></div>
    </form>
  </div>
</section>

<script src="./assets/app.js"></script>
</body>
</html>
